#:schema https://developers.openai.com/codex/config-schema.json
# See:
#   - https://developers.openai.com/codex/local-config#cli
#   - https://github.com/openai/codex/blob/main/docs/config.md

# ---------------------------------------------------------------------------- #
#                                   General                                    #
# ---------------------------------------------------------------------------- #

check_for_update_on_startup = true
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "friendly"
plan_mode_reasoning_effort = "xhigh"
sandbox_mode = "danger-full-access"
service_tier = "default"
suppress_unstable_features_warning = true
web_search = "live"

# ---------------------------------------------------------------------------- #
#                                     Apps                                     #
# ---------------------------------------------------------------------------- #
[apps._default]
  enabled = false

# ---------------------------------------------------------------------------- #
#                                    Desktop                                   #
# ---------------------------------------------------------------------------- #
[desktop]
  composerEnterBehavior = "enter"
  followUpQueueMode = "steer"
  keepRemoteControlAwakeWhilePluggedIn = true
  notifications-permissions-enabled = false
  notifications-turn-mode = "unfocused"
  preventSleepWhileRunning = true
  usePointerCursors = true

[desktop.open-in-target-preferences]
  global = "cursor"

# ---------------------------------------------------------------------------- #
#                                   Features                                   #
# ---------------------------------------------------------------------------- #
[features]
  apps = false
  browser_use = false
  browser_use_external = false
  computer_use = false
  in_app_browser = false
  multi_agent = true
  plugins = false
  remote_compaction_v2 = true
  shell_snapshot = true
  unified_exec = true

# ---------------------------------------------------------------------------- #
#                                 MCP Servers                                  #
# ---------------------------------------------------------------------------- #
[mcp_servers.chrome-devtools]
  args = [
    "-y",
    "chrome-devtools-mcp@latest",
    "--autoConnect",
    "--experimental-page-id-routing",
    "--experimental-memory",
    "--experimental-vision",
    "--experimental-structured-content",
    "--experimental-screencast",
    "--experimental-ffmpeg-path=/opt/homebrew/bin/ffmpeg",
    "--redact-network-headers",
    "--no-performance-crux",
    "--no-usage-statistics",
  ]
  command = "bunx"

[mcp_servers.filesystem]
  args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users"]
  command = "bunx"

[mcp_servers.openaiDeveloperDocs]
  url = "https://developers.openai.com/mcp"

# ---------------------------------------------------------------------------- #
#                              Shell Environment                               #
# ---------------------------------------------------------------------------- #
[shell_environment_policy]
  experimental_use_profile = true
  ignore_default_excludes = true
  inherit = "all"

# ---------------------------------------------------------------------------- #
#                                    Notice                                    #
# ---------------------------------------------------------------------------- #
[notice]
  fast_default_opt_out = true
  hide_rate_limit_model_nudge = true

# ---------------------------------------------------------------------------- #
#                                      TUI                                     #
# ---------------------------------------------------------------------------- #
[tui]
  show_tooltips = false
  status_line = [
    "model-with-reasoning",
    "git-branch",
    "context-used",
    "used-tokens",
  ]
  status_line_use_colors = true
  theme = "gruvbox-dark"

# See https://github.com/openai/codex/issues/9807#issuecomment-4516234724
[tui.keymap]
  chat.decrease_reasoning_effort = "alt-minus"
  chat.increase_reasoning_effort = ["alt-="]
  global.toggle_fast_mode = "alt-f"

  # need to set because `alt-f` is by default set to `move_word_right`
  editor.move_word_right = ["alt-right", "ctrl-right"]

[tui.model_availability_nux]
  "gpt-5.5" = 4
