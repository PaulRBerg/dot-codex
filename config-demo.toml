# See:
#   - https://developers.openai.com/codex/local-config#cli
#   - https://github.com/openai/codex/blob/main/docs/config.md

# ---------------------------------------------------------------------------- #
#                                   General                                    #
# ---------------------------------------------------------------------------- #

check_for_update_on_startup = true
file_opener = "cursor"
model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "friendly"
plan_mode_reasoning_effort = "xhigh"
sandbox_mode = "danger-full-access"
service_tier = "default"
web_search = "live"

# ---------------------------------------------------------------------------- #
#                                   Features                                   #
# ---------------------------------------------------------------------------- #
[features]
  apps = false
  enable_mcp_apps = false
  multi_agent = false
  plugins = false
  shell_snapshot = true
  steer = true
  unified_exec = true

# ---------------------------------------------------------------------------- #
#                                 MCP Servers                                  #
# ---------------------------------------------------------------------------- #
[mcp_servers.chrome-devtools]
  args = [
    "-y",
    "chrome-devtools-mcp@latest",
    "--autoConnect",
    "--no-usage-statistics",
  ]
  command = "npx"

[mcp_servers.filesystem]
  args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users"]
  command = "npx"

[mcp_servers.openaiDeveloperDocs]
  url = "https://developers.openai.com/mcp"

# ---------------------------------------------------------------------------- #
#                              Shell Environment                               #
# ---------------------------------------------------------------------------- #
[shell_environment_policy]
  experimental_use_profile = true
  ignore_default_excludes = true
  inherit = "all"

# ---------------------------------------------------------------------------- #
#                                     Apps                                     #
# ---------------------------------------------------------------------------- #
[apps._default]
  enabled = false

# ---------------------------------------------------------------------------- #
#                                    Skills                                    #
# ---------------------------------------------------------------------------- #
[skills.bundled]
  enabled = false

# ---------------------------------------------------------------------------- #
#                                   Plugins                                    #
# ---------------------------------------------------------------------------- #
[plugins."documents@openai-primary-runtime"]
  enabled = false

[plugins."spreadsheets@openai-primary-runtime"]
  enabled = false

[plugins."presentations@openai-primary-runtime"]
  enabled = false

# ---------------------------------------------------------------------------- #
#                                      TUI                                     #
# ---------------------------------------------------------------------------- #
[tui]
  status_line = [
    "model-with-reasoning",
    "git-branch",
    "context-used",
    "used-tokens",
  ]
  status_line_use_colors = true
  theme = "gruvbox-dark"

# See https://github.com/openai/codex/issues/9807#issuecomment-4516234724
[tui.keymap]
  chat.decrease_reasoning_effort = "alt-minus"
  chat.increase_reasoning_effort = ["alt-="]
  global.toggle_fast_mode = "alt-f"

  # need to set because `alt-f` is by default set to `move_word_right`
  editor.move_word_right = ["alt-right", "ctrl-right"]
