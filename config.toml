#:schema https://developers.openai.com/codex/config-schema.json
# See:
#   - https://developers.openai.com/codex/local-config#cli
#   - https://github.com/openai/codex/blob/main/docs/config.md

# ---------------------------------------------------------------------------- #
#                                   General                                    #
# ---------------------------------------------------------------------------- #

approval_policy = "never"
check_for_update_on_startup = true
model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
notify = [
  "/Users/prb/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient",
  "turn-ended",
]
personality = "friendly"
plan_mode_reasoning_effort = "xhigh"
sandbox_mode = "danger-full-access"
service_tier = "default"
suppress_unstable_features_warning = true
web_search = "live"

# ---------------------------------------------------------------------------- #
#                                     Apps                                     #
# ---------------------------------------------------------------------------- #

[apps._default]
  enabled = false

# ---------------------------------------------------------------------------- #
#                                    Desktop                                   #
# ---------------------------------------------------------------------------- #
[desktop]
  composerEnterBehavior = "enter"
  dock-icon-preference = "codex-system"
  followUpQueueMode = "steer"
  keepRemoteControlAwakeWhilePluggedIn = true
  notifications-permissions-enabled = false
  notifications-turn-mode = "off"
  preventSleepWhileRunning = true
  usePointerCursors = true

[desktop.open-in-target-preferences]
  global = "cursor"

# ---------------------------------------------------------------------------- #
#                                   Features                                   #
# ---------------------------------------------------------------------------- #
[features]
  apps = false
  browser_use = false
  browser_use_external = false
  computer_use = false
  default_mode_request_user_input = true
  in_app_browser = false
  multi_agent = true
  plugin_sharing = false
  plugins = false
  remote_compaction_v2 = true
  remote_plugin = false
  shell_snapshot = true
  tool_suggest = false
  unified_exec = true

[features.multi_agent_v2]
  enabled = true
  hide_spawn_agent_metadata = false
  tool_namespace = "agents"

# ---------------------------------------------------------------------------- #
#                                     Hooks                                    #
# ---------------------------------------------------------------------------- #
[hooks.state."/Users/prb/.codex/hooks.json:user_prompt_submit:0:0"]
  trusted_hash = "sha256:75c87492e44d38dbbb15b264ec50b8f0b165e94d4af0c95869543c0046ae7e47"

# ---------------------------------------------------------------------------- #
#                                 Marketplaces                                 #
# ---------------------------------------------------------------------------- #
[marketplaces.openai-bundled]
  last_updated = "2026-07-10T19:17:50Z"
  source = "/Users/prb/.codex/.tmp/bundled-marketplaces/openai-bundled"
  source_type = "local"

[marketplaces.openai-primary-runtime]
  last_updated = "2026-07-05T18:50:05Z"
  source = "/Users/prb/.cache/codex-runtimes/codex-primary-runtime/plugins/openai-primary-runtime"
  source_type = "local"

[mcp_servers.chrome-devtools]
  command = "/Users/prb/.local/libexec/mcp/chrome-devtools"

[mcp_servers.openaiDeveloperDocs]
  url = "https://developers.openai.com/mcp"

[mcp_servers.serena]
  args = ["--context=codex"]
  command = "/Users/prb/.local/libexec/mcp/serena"
  startup_timeout_sec = 15.0

# ---------------------------------------------------------------------------- #
#                                    Notice                                    #
# ---------------------------------------------------------------------------- #
[notice]
  fast_default_opt_out = true
  hide_rate_limit_model_nudge = true

# ---------------------------------------------------------------------------- #
#                              Shell Environment                               #
# ---------------------------------------------------------------------------- #
[shell_environment_policy]
  experimental_use_profile = true
  ignore_default_excludes = true
  inherit = "all"

# ---------------------------------------------------------------------------- #
#                                    Skills                                    #
# ---------------------------------------------------------------------------- #
[[skills.config]]
  enabled = false
  path = "/Users/prb/.codex/skills/.system/imagegen/SKILL.md"

[[skills.config]]
  enabled = true
  path = "/Users/prb/.codex/skills/.system/openai-docs/SKILL.md"

[[skills.config]]
  enabled = false
  path = "/Users/prb/.codex/skills/.system/plugin-creator/SKILL.md"

[[skills.config]]
  enabled = false
  path = "/Users/prb/.codex/skills/.system/skill-creator/SKILL.md"

[[skills.config]]
  enabled = false
  path = "/Users/prb/.codex/skills/.system/skill-installer/SKILL.md"

# ---------------------------------------------------------------------------- #
#                                      TUI                                     #
# ---------------------------------------------------------------------------- #
[tui]
  show_tooltips = false
  status_line = [
    "model-with-reasoning",
    "git-branch",
    "context-used",
    "used-tokens",
  ]
  status_line_use_colors = true
  theme = "gruvbox-dark"

[tui.keymap.global]
  toggle_fast_mode = "alt-f"

# `alt-f` defaults to word-right in the composer; keep that action on arrows.
[tui.keymap.editor]
  move_word_right = ["alt-right", "ctrl-right"]

[tui.model_availability_nux]
  "gpt-5.6-sol" = 4

# ---------------------------------------------------------------------------- #
#                                   Plugins                                    #
# ---------------------------------------------------------------------------- #
[plugins."documents@openai-primary-runtime"]
  enabled = false

[plugins."pdf@openai-primary-runtime"]
  enabled = false

[plugins."presentations@openai-primary-runtime"]
  enabled = false

[plugins."spreadsheets@openai-primary-runtime"]
  enabled = false

[plugins."template-creator@openai-primary-runtime"]
